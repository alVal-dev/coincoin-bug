<section class="home-page">
  <div class="home-page__duck">
    <app-duck-avatar mood="curious" animation="none"></app-duck-avatar>
  </div>

  <div class="home-page__content">
    @if (!hasActiveSession()) {
      <app-welcome-panel (startSession)="onStartSession()"></app-welcome-panel>
    } @else {
      <app-chat-session></app-chat-session>
    }
  </div>
</section>
